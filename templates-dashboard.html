<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Templates Dashboard - GPS DSC2S</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/sop-templates.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="page-header">
            <div class="header-left">
                <h1>Templates Dashboard</h1>
                <div class="nav-buttons">
                    <button class="nav-btn" id="btn-sop" onclick="window.location.href='sop-dashboard.html'" title="Standard Operating Procedures">
                        📋 SOPs
                    </button>
                    <button class="nav-btn active" id="btn-templates" title="Canned Responses Templates">
                        ✉️ Templates
                    </button>
                    <button class="nav-btn" onclick="window.location.href='dashboard-v2.html'" title="Main Dashboard">
                        🏠 Main
                    </button>
                </div>
            </div>
            <div class="header-right">
                <select id="theme-select" class="filter-select" title="Select Theme">
                    <option value="dark">Dark</option>
                    <option value="daylight">Daylight</option>
                    <option value="sunset">Sunset</option>
                    <option value="twilight">Twilight</option>
                    <option value="blossom-dawn">Blossom Dawn</option>
                    <option value="blue-sky">Blue Sky</option>
                    <option value="fresh-mint">Fresh Mint</option>
                </select>
                <button class="expand-btn" id="expand-all-btn">
                    <span class="toggle-icon">▼</span>
                    Expand All
                </button>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card primary">
                <span class="stat-label">Total Templates</span>
                <span class="stat-value" id="stat-templates">—</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Tables</span>
                <span class="stat-value" id="stat-tables">—</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Location Filter</span>
                <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                    <span class="location-badge green" style="cursor: pointer;" data-filter="na">NA</span>
                    <span class="location-badge magenta" style="cursor: pointer;" data-filter="eu">EU</span>
                    <span class="location-badge global" style="cursor: pointer;" data-filter="global">Global</span>
                </div>
            </div>
        </div>

        <!-- Search & Filters -->
        <div class="search-container">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" class="search-input" 
                       placeholder="Search templates by name, content, or SOP...">
            </div>
            <div class="filter-group">
                <span class="filter-label">Table:</span>
                <select id="table-filter" class="filter-select">
                    <option value="">All Tables</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">Location:</span>
                <select id="location-filter" class="filter-select">
                    <option value="">All Locations</option>
                    <option value="na">NA Specific</option>
                    <option value="eu">EU Specific</option>
                    <option value="global">Global</option>
                </select>
            </div>
            <div class="filter-group">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="checkbox" id="show-mandarin" checked style="width: 1rem; height: 1rem;">
                    <span class="filter-label" style="margin: 0;">Show Mandarin</span>
                </label>
            </div>
        </div>

        <!-- Templates Container -->
        <div id="templates-container">
            <!-- Loading State -->
            <div class="loader-container" id="loading-state">
                <div class="loader"></div>
                <span class="loading-text">Loading template data...</span>
            </div>
            
            <!-- Empty State -->
            <div class="empty-state" id="empty-state" style="display: none;">
                <span class="empty-icon">✉️</span>
                <h3 class="empty-title">No Templates Found</h3>
                <p class="empty-description">
                    No templates match your search criteria. Try adjusting your filters.
                </p>
            </div>
            
            <!-- Templates will be rendered here -->
            <div id="templates-list"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/sop-templates-data.js"></script>
    <script src="js/sop-templates-search.js"></script>
    <script src="js/sop-templates-ui.js"></script>
    
    <script>
        // Initialize Templates Dashboard
        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize theme
            SOPUI.initTheme();
            
            // Load template data
            await SOPData.loadTemplates();
            
            // Initialize UI
            SOPUI.init();
            SOPUI.renderAllTemplates(SOPData.getTemplates());
            SOPUI.updateTemplateStats();
            
            // Initialize search
            TemplatesSearch.init();
            
            // Hide loading state
            document.getElementById('loading-state').style.display = 'none';
        });
        
        // Theme change handler
        document.getElementById('theme-select').addEventListener('change', (e) => {
            SOPUI.setTheme(e.target.value);
        });
        
        // Expand/Collapse All
        document.getElementById('expand-all-btn').addEventListener('change', () => {
            SOPUI.toggleAllTables();
        });
        
        // Location badge filters
        document.querySelectorAll('[data-filter]').forEach(badge => {
            badge.addEventListener('click', () => {
                const filter = badge.dataset.filter;
                document.getElementById('location-filter').value = filter;
                TemplatesSearch.filter();
            });
        });
    </script>
</body>
</html>
